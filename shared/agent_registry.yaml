  cursor:
    id: cursor
    display_name: Cursor
    aliases:
      - cursor-ide
    identity_kind: agent_host
    host:
      id: cursor
      kind: ide
    status: proposed
    registration_type: experimental
    role: consumer
    trust_source: observed_local_config
    capabilities:
      inherit_role: true
      allow: []
    path_scopes:
      - reports/agent-requests/**
    platforms: []
    skill_access:
      mode: none
      platforms: []
    storage:
      boundary: external
      data_root: unconfirmed
      cache_root: unconfirmed
    session_store:
      mode: unconfirmed
      boundary: external
    lifecycle:
      owner: user
      reviewed_at: null
      expires_at: "2026-07-20T23:59:59+08:00"
    evidence:
      - mcp/README.md
    unresolved:
      - Whether Cursor should identify an agent or only host another agent.
      - Whether a workspace-specific session boundary is available.
      - No workspace runtime enforcement adapter is installed; keep proposed
        Consumer authority and do not grant write capabilities.
    active_lease_refs: []

