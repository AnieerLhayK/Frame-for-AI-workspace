schema_version: "0.1"
purpose: "Concrete agent identity, lifecycle, scope, platform, and storage registrations."

allowed_statuses:
  - proposed
  - testing
  - active
  - suspended
  - retired
allowed_registration_types:
  - permanent
  - experimental
  - temporary
  - candidate
allowed_trust_sources:
  - user_approved
  - workspace_migration
  - observed_local_config
  - unconfirmed

agents:
  codex:
    id: codex
    display_name: Codex
    aliases:
      - codex-desktop
      - codex-cli
    identity_kind: agent
    host:
      id: codex
      kind: desktop_and_cli
    status: active
    registration_type: permanent
    role: structural_maintainer
    trust_source: user_approved
    capabilities:
      inherit_role: true
      allow: []
    path_scopes:
      - "**"
    platforms:
      - id: codex
        manifest_ref: platform_roots.codex
    skill_access:
      mode: manifest_exposures
      platforms:
        - codex
    storage:
      boundary: external
      data_root: "${DATA_ROOT}/codex"
      cache_root: "${DATA_ROOT}/codex/cache"
    session_store:
      mode: platform_managed
      boundary: external
    lifecycle:
      owner: user
      reviewed_at: "2026-06-20T18:30:00+08:00"
      expires_at: null
    active_lease_refs: []

  claude:
    id: claude
    display_name: Claude Code
