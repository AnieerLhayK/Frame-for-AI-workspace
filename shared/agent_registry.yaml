      data_root: "${DATA_ROOT}/claude"
      cache_root: "${DATA_ROOT}/claude/cache"
    session_store:
      mode: manifest_ref
      manifest_ref: session_stores.claude
      boundary: external
    lifecycle:
      owner: user
      reviewed_at: "2026-06-20T18:30:00+08:00"
      expires_at: null
    active_lease_refs: []

  opencode:
    id: opencode
    display_name: OpenCode
    aliases: []
    identity_kind: agent
    host:
      id: opencode
      kind: cli
    status: active
    registration_type: permanent
    role: record_producer
    trust_source: workspace_migration
    capabilities:
