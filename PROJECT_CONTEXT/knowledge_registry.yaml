schema_version: "0.1"
purpose: "Route a topic to the smallest useful knowledge entry points without scanning the workspace."

rules:
  - "This registry is an index, not a source of truth."
  - "Return entry paths and purposes; read file content only after the user or task needs it."
  - "Prefer PROJECT_CONTEXT for current workspace state, shared for enforceable policy, and WORKSPACE_ENGINEERING for reusable methodology."
  - "Reports are snapshots and require freshness checks before decision use."

