schema_version: "0.1"
purpose: "Route maintenance tasks to the smallest safe context before reading broadly or editing."
truth_sources:
  - "workspace_manifest.yaml"
  - "shared/"
  - "current git state"

default_rules:
  first_steps:
    - "Read AGENTS.md."
    - "Run git status --short --untracked-files=all."
    - "Use scripts/resolve_task_context.py --list when the exact task id is unknown."
    - "Resolve the exact task through scripts/resolve_task_context.py before broad discovery."
    - "Treat the resolver output as the bounded task registry and prompt registry view."
    - "Read the latest 5 entries in PROJECT_CONTEXT/task_ledger.md when continuity or previous decisions matter."
    - "Load only the resolver-declared required context first."
    - "Expand optional context only from evidence and measure it with --include-optional."
  git_guard:
    require_clean_or_explained_worktree: true
    do_not_overwrite_user_changes: true
    no_auto_commit_without_user_request: true
    prefer_branch_for_governance_changes: true
  source_rules:
    source_root: "workspace_manifest.yaml -> workspace.source_of_truth"
    do_not_edit_loading_surfaces: true
    reports_are_snapshots: true
  tool_policy:
    enforcement: "deny_unlisted"
    default_profile: "workspace_readonly"
    profiles:
      workspace_readonly:
        allow:
          - "workspace.read"
          - "workspace.search"
          - "workspace.resolve"
          - "git.read"
          - "shell.readonly"
          - "validation.readonly"
          - "documentation.read"
        confirm: []
        deny:
          - "workspace.write"
          - "filesystem.delete"
          - "filesystem.move"
          - "git.write"
          - "platform.write"
          - "environment.write"
          - "browser.session"
          - "email"
          - "messaging"
          - "office.write"
          - "credentials"
      workspace_maintenance:
        allow:
          - "workspace.read"
          - "workspace.search"
          - "workspace.resolve"
          - "workspace.write_scoped"
          - "git.read"
          - "git.stage"
          - "shell.focused"
          - "validation.run"
          - "documentation.read"
        confirm:
          - "git.commit"
          - "git.push"
        deny:
          - "filesystem.delete"
          - "filesystem.move"
          - "platform.write"
          - "environment.write"
          - "browser.session"
          - "email"
          - "messaging"
          - "office.write"
          - "credentials"
      platform_maintenance:
        allow:
          - "workspace.read"
          - "workspace.search"
          - "workspace.resolve"
          - "workspace.write_scoped"
          - "git.read"
          - "git.stage"
          - "shell.focused"
          - "validation.run"
          - "platform.read"
          - "documentation.read"
        confirm:
          - "git.commit"
          - "git.push"
          - "platform.write"
          - "environment.write"
        deny:
          - "filesystem.delete"
          - "filesystem.move"
          - "browser.session"
          - "email"
          - "messaging"
          - "office.write"
          - "credentials"
      cleanup_migration:
        allow:
          - "workspace.read"
          - "workspace.search"
          - "workspace.resolve"
          - "workspace.write_scoped"
          - "git.read"
          - "git.stage"
          - "shell.focused"
          - "validation.run"
          - "platform.read"
        confirm:
          - "filesystem.delete"
          - "filesystem.move"
          - "git.commit"
          - "git.push"
          - "platform.write"
          - "environment.write"
        deny:
          - "browser.session"
          - "email"
          - "messaging"
          - "office.write"
          - "credentials"
  default_ignore:
    - ".git/"
    - "reports/legacy_git_metadata/"
    - "${DATA_ROOT}/"
    - "${WORKSPACE_ROOT}/tools/"
    - "${SCRATCH_ROOT}/"
    - "archive*/"
    - "archives/"
    - "backups/"
  context_budget:
    policy_file: "PROJECT_CONTEXT/context_budget.md"
    initial_level: "resolver_required"
    expand_only_from_evidence: true
    reports_default: "avoid"
    archives_default: "prohibited_without_explicit_approval"
    token_meter:
      encoding: "o200k_base"
      enforcement: "warn"
      required_warn_tokens: 8000
      expanded_warn_tokens: 16000
      hard_max_tokens: null
      max_file_bytes: 2097152
      top_file_count: 10
      fallback_method: "ascii_chars_div_4_plus_non_ascii_chars"
      root_agents_warn_tokens: 900
    resolver:
      preloaded_files:
        - "AGENTS.md"
      consumed_files:
        - "PROJECT_CONTEXT/task_registry.yaml"
        - "PROJECT_CONTEXT/context_budget.md"
        - "USAGE_GUIDES/prompt_registry.yaml"
      retain_consumed_for_tasks:
        - "startup_context_optimization"
        - "context_resolution_tooling"
        - "task_registry_update"
        - "prompt_usage_update"
  task_ledger:
    path: "PROJECT_CONTEXT/task_ledger.md"
    read_recent_entries: 5
    append_when:
      - "source-of-truth boundaries change"
      - "task routing, context budget, or prompt routing changes"
      - "platform exposure or local loading surfaces change"
      - "shared protocol, runtime loop, or validation behavior changes"
      - "cleanup, migration, archival, or deletion decisions are made"
      - "reports or validation snapshots are regenerated"
    not_source_of_truth_for:
      - "machine-readable paths"
      - "shared protocol contracts"
      - "current git state"
  prompt_registry:
    path: "USAGE_GUIDES/prompt_registry.yaml"
    use_for:
      - "mapping task prompt ids to reusable prompt frames"
      - "finding existing copy-ready prompt templates"
      - "avoiding repeated meta-prompt reconstruction"
    not_source_of_truth_for:
      - "task classification"
      - "workspace paths"
      - "protocol contracts"

tasks:
  agent_governance_update:
    use_when:
      - "Changing agent registration, lifecycle, roles, workspace surface classifications, change-request routing, or temporary capability lease rules."
    use_when_zh:
      - "修改 Agent 注册、生命周期、角色、工作区表面分类、变更请求路由或临时能力授权规则"
    required:
      - "shared/agent_governance_policy.md"
      - "shared/agent_governance.yaml"
      - "shared/agent_registry.yaml"
      - "shared/schemas/agent_registration.schema.json"
      - "scripts/agent_governance.py"
      - "scripts/tests/test_agent_governance.py"
    optional:
      - "shared/workspace_policy.md"
      - "shared/reporting_policy.md"
      - "USAGE_GUIDES/QUICK_START/agent_governance.md"
      - "scripts/workspace_cli.py"
      - "scripts/tests/test_workspace_cli.py"
    ignore:
      - "private corpus material"
      - "platform session stores"
      - "active external lease contents unless explicitly supplied"
      - "unrelated skill implementation"
    prompt:
      - "task_routing"
    tool_profile: "workspace_maintenance"
    ledger: true
    budget:
      required_warn_tokens: 20000
      expanded_warn_tokens: 26000
    write_scope:
      - "workspace_manifest.yaml"
      - "shared/"
      - "reports/agent-requests/"
      - "reports/agent-experiments/"
      - "PROJECT_CONTEXT/"
      - "USAGE_GUIDES/QUICK_START/agent_governance.md"
      - "README.md"
      - "ARCHITECTURE.md"
      - "scripts/agent_governance.py"
      - "scripts/tests/test_agent_governance.py"
      - "scripts/workspace_cli.py"
      - "scripts/tests/test_workspace_cli.py"
    validation:
      - "python -m unittest scripts.tests.test_agent_governance scripts.tests.test_workspace_cli"
      - "python scripts/workspace_cli.py agent status"
      - "python scripts/workspace_cli.py agent list"
      - "python scripts/workspace_cli.py agent validate codex"
      - "python scripts/workspace_cli.py agent doctor cursor"
      - "python scripts/workspace_cli.py agent check --agent hermes --path workspace_manifest.yaml"
      - "python scripts/workspace_cli.py agent check --agent hermes --path packages/character-system/reports/runtime-loop/diagnoses/DIAG-demo.md"
      - "python scripts/validate_protocols.py"
      - "python scripts/validate_manifest.py"
      - "git diff --check"

  runtime_authorization_enforcement:
    use_when:
      - "Connecting Agent and Skill authority to runtime tool dispatch, actor-aware change verification, or platform guard health checks."
    use_when_zh:
      - "连接 Agent 和 Skill 权限到运行时工具分发、参与者感知变更验证或平台守卫健康检查"
    required:
      - "shared/agent_governance_policy.md"
      - "shared/agent_governance.yaml"
      - "shared/agent_registry.yaml"
      - "workspace_manifest.yaml"
      - "scripts/agent_governance.py"
      - "scripts/hermes_workspace_guard.py"
      - "reasonix.toml"
      - "opencode.json"
      - ".opencode/plugins/workspace-governance.js"
      - "scripts/verify_change_scope.py"
      - "scripts/workflow_check.py"
      - "scripts/workspace_health.py"
    optional:
      - "AGENTS.md"
      - "USAGE_GUIDES/QUICK_START/agent_governance.md"
      - "USAGE_GUIDES/QUICK_START/workspace_cli.md"
      - "WORKSPACE_ENGINEERING/governance_patterns.md"
      - "packages/character-system/runtime/characters/zyc/SKILL.md"
      - "packages/character-system/engineering/diagnosis/style-doctor/SKILL.md"
    ignore:
      - "private corpus material"
      - "unrelated Skill implementation"
      - "external Session contents except bounded incident evidence"
      - "platform data unrelated to workspace runtime enforcement"
    prompt:
      - "task_routing"
    tool_profile: "workspace_maintenance"
    ledger: true
    budget:
      required_warn_tokens: 32000
      expanded_warn_tokens: 40000
    write_scope:
      - "AGENTS.md"
      - "PROJECT_CONTEXT/task_registry.yaml"
      - "PROJECT_CONTEXT/current_status.md"
      - "PROJECT_CONTEXT/task_ledger.md"
      - "PROJECT_CONTEXT/todo.md"
      - "shared/agent_governance_policy.md"
      - "shared/agent_governance.yaml"
      - "shared/agent_registry.yaml"
      - "scripts/agent_governance.py"
      - "scripts/hermes_workspace_guard.py"
      - "reasonix.toml"
      - "opencode.json"
      - ".opencode/plugins/workspace-governance.js"
      - "scripts/verify_change_scope.py"
      - "scripts/workflow_check.py"
      - "scripts/workspace_cli.py"
      - "scripts/workspace_health.py"
      - "scripts/tests/test_agent_governance.py"
      - "scripts/tests/test_hermes_workspace_guard.py"
      - "scripts/tests/test_platform_agent_guards.py"
      - "scripts/tests/test_verify_change_scope.py"
      - "scripts/tests/test_workflow_check.py"
      - "scripts/tests/test_workspace_cli.py"
      - "scripts/tests/test_workspace_health.py"
      - "USAGE_GUIDES/QUICK_START/agent_governance.md"
      - "USAGE_GUIDES/QUICK_START/workspace_cli.md"
      - "WORKSPACE_ENGINEERING/governance_patterns.md"
      - "packages/character-system/runtime/characters/zyc/SKILL.md"
      - "packages/character-system/engineering/diagnosis/style-doctor/SKILL.md"
      - "reports/manifest_validation_report.md"
      - "reports/protocol_validation_report.md"
      - "reports/workspace_health_report.md"
      - "reports/workspace_setup_report.md"
    validation:
      - "python -m unittest scripts.tests.test_agent_governance scripts.tests.test_hermes_workspace_guard scripts.tests.test_platform_agent_guards scripts.tests.test_verify_change_scope scripts.tests.test_workflow_check scripts.tests.test_workspace_cli scripts.tests.test_workspace_health"
      - "python scripts/workspace_cli.py agent check --agent hermes --skill zyc --path packages/character-system/runtime/characters/zyc/references/voice_card.md"
      - "python scripts/workspace_cli.py agent check --agent hermes --skill style-doctor --path packages/character-system/reports/runtime-loop/diagnoses/DIAG-demo.md"
      - "python scripts/workspace_cli.py agent check --agent reasonix --skill zyc --path packages/character-system/runtime/characters/zyc/references/voice_card.md"
      - "python scripts/workspace_cli.py agent check --agent opencode --skill style-doctor --path packages/character-system/reports/runtime-loop/diagnoses/DIAG-demo.md"
      - "python scripts/workspace_cli.py changes verify runtime_authorization_enforcement --agent codex --strict"
      - "python scripts/workspace_cli.py workflow check runtime_authorization_enforcement --agent codex --strict"
      - "python scripts/workspace_cli.py health --with-tests"
      - "python scripts/validate_manifest.py"
      - "python scripts/validate_protocols.py"
      - "git diff --check"

  project_memory_maintenance:
    use_when:
      - "Reconciling current status, todo priorities, handoff notes, or recent completed-task metadata without changing workspace behavior."
    use_when_zh:
      - "更新当前状态、待办优先级、交接记录或已完成任务元数据，不改变工作区行为"
    required:
      - "PROJECT_CONTEXT/current_status.md"
      - "PROJECT_CONTEXT/todo.md"
    optional:
      - "PROJECT_CONTEXT/task_ledger.md"
      - "PROJECT_CONTEXT/session_handoff.md"
      - "PROJECT_CONTEXT/README.md"
    ignore:
      - "reports/"
      - "private corpus material"
      - "platform loading surfaces"
      - "skill implementation"
      - "ledger entries older than the latest 5 unless a named task requires reconciliation"
    prompt:
      - "task_routing"
    tool_profile: "workspace_maintenance"
    ledger: true
    write_scope:
      - "PROJECT_CONTEXT/current_status.md"
      - "PROJECT_CONTEXT/todo.md"
      - "PROJECT_CONTEXT/task_ledger.md"
      - "PROJECT_CONTEXT/session_handoff.md"
    validation:
      - "python scripts/resolve_task_context.py project_memory_maintenance --format json"
      - "python scripts/workspace_cli.py summary --format json"
      - "python scripts/workspace_cli.py health --with-tests"
      - "git diff --check"

  startup_context_optimization:
    use_when:
      - "Reducing always-loaded agent instructions, startup context, or resolver regression risk."
    use_when_zh:
      - "减少常加载的 Agent 指令、启动上下文或解析器回归风险"
    required:
      - "AGENTS.md"
      - "PROJECT_CONTEXT/task_registry.yaml"
      - "PROJECT_CONTEXT/context_budget.md"
      - "PROJECT_CONTEXT/task_ledger.md"
      - "scripts/resolve_task_context.py"
      - "scripts/tests/test_resolve_task_context.py"
      - "scripts/tests/test_startup_context_policy.py"
    optional:
      - "README.md"
      - "PROJECT_CONTEXT/README.md"
      - "PROJECT_CONTEXT/current_status.md"
      - "PROJECT_CONTEXT/todo.md"
    ignore:
      - "reports/"
      - "private corpus material"
      - "platform loading surfaces"
      - "skill implementation beyond entry files"
    prompt:
      - "task_routing"
    tool_profile: "workspace_maintenance"
    ledger: true
    budget:
      required_warn_tokens: 24000
      expanded_warn_tokens: 30000
    write_scope:
      - "AGENTS.md"
      - "README.md"
      - "PROJECT_CONTEXT/"
      - "scripts/resolve_task_context.py"
      - "scripts/tests/test_resolve_task_context.py"
      - "scripts/tests/test_startup_context_policy.py"
    validation:
      - "python -m unittest scripts.tests.test_resolve_task_context scripts.tests.test_startup_context_policy"
      - "python scripts/resolve_task_context.py platform_exposure --format json"
      - "python scripts/resolve_task_context.py skill_metadata_update --bind target-skill=packages/character-system/engineering/generation/character-generator --format json"
      - "git diff --check"

  developer_interface_tooling:
    use_when:
      - "Changing the unified workspace CLI or its command delegation without changing underlying tool behavior."
    use_when_zh:
      - "修改统一工作区 CLI 或命令委托行为，不改变底层工具行为"
    required:
      - "scripts/workspace_cli.py"
      - "scripts/tests/test_workspace_cli.py"
    optional:
      - "README.md"
      - "scripts/resolve_task_context.py"
      - "scripts/bootstrap_workspace.py"
      - "scripts/validate_manifest.py"
      - "scripts/validate_protocols.py"
      - "scripts/check_links.ps1"
    ignore:
      - "reports/"
      - "private corpus material"
      - "platform loading surfaces"
      - "unrelated skill implementation"
    prompt:
      - "task_routing"
    tool_profile: "workspace_maintenance"
    ledger: true
    write_scope:
      - "PROJECT_CONTEXT/task_registry.yaml"
      - "PROJECT_CONTEXT/task_ledger.md"
      - "README.md"
      - "scripts/workspace_cli.py"
      - "scripts/tests/test_workspace_cli.py"
    validation:
      - "python -m unittest scripts.tests.test_workspace_cli"
      - "python scripts/workspace_cli.py task list"
      - "python scripts/workspace_cli.py prompt list"
      - "python scripts/workspace_cli.py bootstrap --print-json"
      - "git diff --check"

  skill_lifecycle_tooling:
    use_when:
      - "Creating or changing manifest-aware skill init, validate, list, or guarded platform exposure commands."
    use_when_zh:
      - "创建或修改 manifest 感知的 skill 初始化、验证、列表或受控平台暴露命令"
    required:
      - "workspace_manifest.yaml"
      - "scripts/skill_lifecycle.py"
      - "scripts/tests/test_skill_lifecycle.py"
    optional:
      - "scripts/workspace_cli.py"
      - "scripts/tests/test_workspace_cli.py"
      - "scripts/setup_links.ps1"
      - "scripts/check_links.ps1"
      - "USAGE_GUIDES/QUICK_START/workspace_cli.md"
      - "README.md"
    ignore:
      - "reports/"
      - "private corpus material"
      - "unrelated skill implementation"
      - "platform loading surfaces except the single manifest-selected projection during expose --apply"
    prompt:
      - "task_routing"
    tool_profile: "platform_maintenance"
    ledger: true
    budget:
      required_warn_tokens: 9000
      expanded_warn_tokens: 16000
    write_scope:
      - "PROJECT_CONTEXT/task_registry.yaml"
      - "PROJECT_CONTEXT/task_ledger.md"
      - "README.md"
      - "USAGE_GUIDES/QUICK_START/workspace_cli.md"
      - "scripts/skill_lifecycle.py"
      - "scripts/tests/test_skill_lifecycle.py"
      - "scripts/workspace_cli.py"
      - "scripts/tests/test_workspace_cli.py"
      - "a new skill source path explicitly selected by skill init"
      - "the single manifest-selected projection explicitly approved through skill expose --apply"
    validation:
      - "python -m unittest scripts.tests.test_skill_lifecycle scripts.tests.test_workspace_cli"
      - "python scripts/workspace_cli.py skill list"
      - "python scripts/workspace_cli.py skill validate character-generator"
      - "python scripts/workspace_cli.py skill expose character-generator --platform codex"
      - "python scripts/resolve_task_context.py skill_lifecycle_tooling --format json"
      - "git diff --check"

  skill_release_packaging:
    use_when:
      - "Packaging one or more workspace skills as a versioned external product bundle or preparing a GitHub Release."
      - "Changing release-local installation, verification, beginner guidance, checksums, or standalone compatibility overlays."
      - "Changing the scrubbed public workspace skeleton publishing, verification, or sync tooling."
    use_when_zh:
      - "将一个或多个工作区 skill 打包为版本化外部产品包或准备 GitHub Release"
    required:
      - "workspace_manifest.yaml"
      - "shared/delivery_output_policy.md"
      - "packages/character-system/runtime/characters/zyc/SKILL.md"
      - "packages/character-system/engineering/diagnosis/style-doctor/SKILL.md"
      - "packages/character-system/runtime/characters/zyc/scripts/package_skill.py"
    optional:
      - "packages/character-system/runtime/characters/zyc/README.md"
      - "packages/character-system/engineering/diagnosis/style-doctor/README.md"
      - "USAGE_GUIDES/PROMPT_TEMPLATES/character-system/runtime/zyc.md"
      - "USAGE_GUIDES/PROMPT_TEMPLATES/character-system/engineering/diagnosis/style-doctor.md"
      - "scripts/skill_lifecycle.py"
      - "scripts/publish_public.py"
      - "scripts/publish_check.py"
      - "scripts/sync_public_repo.py"
    ignore:
      - "private corpus material"
      - "packages/character-system/reports/runtime-loop/"
      - "packages/character-system/runtime/characters/zyc/reports/"
      - "packages/character-system/runtime/characters/zyc/tests/"
      - "platform loading surfaces except isolated release-install validation roots"
    prompt:
      - "task_routing"
    tool_profile: "platform_maintenance"
    ledger: true
    budget:
      required_warn_tokens: 18000
      expanded_warn_tokens: 28000
    write_scope:
      - "PROJECT_CONTEXT/task_registry.yaml"
      - "PROJECT_CONTEXT/task_ledger.md"
      - "packages/character-system/distribution/"
      - "packages/character-system/runtime/characters/zyc/SKILL.md"
      - "packages/character-system/runtime/characters/zyc/README.md"
      - "packages/character-system/engineering/diagnosis/style-doctor/SKILL.md"
      - "packages/character-system/engineering/diagnosis/style-doctor/README.md"
      - "scripts/publish_public.py"
      - "scripts/publish_check.py"
      - "scripts/sync_public_repo.py"
      - "scripts/tests/test_publish_public.py"
    validation:
      - "python scripts/resolve_task_context.py skill_release_packaging"
      - "python scripts/skill_lifecycle.py validate zyc"
      - "python scripts/skill_lifecycle.py validate style-doctor"
      - "release builder deterministic-build and package-content checks"
      - "isolated OpenCode junction, copy, discovery, and smoke checks"
      - "python scripts/validate_manifest.py"
      - "python scripts/validate_protocols.py"
      - "python -m pytest -q scripts/tests/test_publish_public.py"
      - "publish_public.py explicit staging-dir smoke check under the tool staging directory"
      - "publish_check.py verification against the generated staging directory"
      - "python scripts/workspace_cli.py changes verify skill_release_packaging --strict"
      - "python scripts/workspace_cli.py workflow check skill_release_packaging"
      - "git diff --check"

  workspace_health_tooling:
    use_when:
      - "Changing the live read-only workspace health aggregator or its check summaries."
    use_when_zh:
      - "修改只读工作区健康聚合器或检查摘要"
    required:
      - "scripts/workspace_health.py"
      - "scripts/tests/test_workspace_health.py"
    optional:
      - "scripts/workspace_cli.py"
      - "scripts/tests/test_workspace_cli.py"
      - "scripts/workspace_health.py"
      - "USAGE_GUIDES/QUICK_START/workspace_cli.md"
      - "scripts/bootstrap_workspace.py"
      - "scripts/find_knowledge.py"
      - "scripts/report_status.py"
      - "scripts/check_links.ps1"
    ignore:
      - "reports/ contents"
      - "private corpus material"
      - "skill implementation"
      - "platform directories beyond the existing link checker"
    prompt:
      - "task_routing"
    tool_profile: "workspace_maintenance"
    ledger: true
    write_scope:
      - "README.md"
      - "PROJECT_CONTEXT/task_registry.yaml"
      - "PROJECT_CONTEXT/task_ledger.md"
      - "USAGE_GUIDES/QUICK_START/workspace_cli.md"
      - "scripts/workspace_health.py"
      - "scripts/tests/test_workspace_health.py"
      - "scripts/workspace_cli.py"
      - "scripts/tests/test_workspace_cli.py"
    validation:
      - "python -m unittest scripts.tests.test_workspace_health scripts.tests.test_workspace_cli"
      - "python scripts/workspace_cli.py health --format json"
      - "python scripts/workspace_cli.py health --with-tests"
      - "python scripts/resolve_task_context.py workspace_health_tooling --format json"
      - "git diff --check"

  workspace_launcher_tooling:
    use_when:
      - "Changing or installing the user-local short workspace command."
    use_when_zh:
      - "修改或安装用户本地的快捷 workspace 命令"
    required:
      - "scripts/workspace_launcher.py"
      - "scripts/tests/test_workspace_launcher.py"
