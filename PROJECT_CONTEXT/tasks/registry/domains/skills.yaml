# Canonical task definitions for the PROJECT_CONTEXT task domain.
tasks:
  github_ci_governance:
    use_when:
    - Diagnosing or repairing a GitHub Actions workflow whose repository-wide test
      command crosses multiple package-local import roots.
    - Registering a GitHub plugin skill required to authorize the bounded CI repair.
    use_when_zh:
    - 诊断或修复跨越多个包本地导入根目录的 GitHub Actions 测试工作流。
    - 登记用于授权受边界约束 CI 修复的 GitHub 插件技能。
    required:
    - workspace_manifest.yaml
    - scripts/reporting/ci_run.py
    - scripts/_compat.py
    - scripts/tests/reporting/test_ci_run.py
    - scripts/tests/workspace/test_compat.py
    - scripts/workspace/agent_governance.py
    - scripts/tests/workspace/test_agent_governance.py
    - scripts/tests/workspace/test_workspace_cli.py
    - scripts/validation/validate_manifest.py
    - skills/disk-scan-reporter/tests/test_disk_scan.py
    - shared/workspace_policy.md
    - AGENTS.md
    optional:
    - .github/workflows/
    - scripts/ci_run.py
    - scripts/tests/workspace/test_skill_lifecycle.py
    - reports/manifest_validation_report.md
    - PROJECT_CONTEXT/tasks/records/
    ignore:
    - mcp/
    - private corpus material
    - platform projections
    - external plugin source
    prompt:
    - task_routing
    tool_profile: workspace_maintenance
    ledger: true
    budget:
      required_warn_tokens: 18000
      expanded_warn_tokens: 24000
    write_scope:
    - PROJECT_CONTEXT/tasks/registry/index.yaml
    - PROJECT_CONTEXT/tasks/ledger/README.md
    - PROJECT_CONTEXT/tasks/ledger/2026/07/16.md
    - workspace_manifest.yaml
    - scripts/reporting/ci_run.py
    - scripts/_compat.py
    - scripts/tests/reporting/test_ci_run.py
    - scripts/tests/workspace/test_compat.py
    - scripts/workspace/agent_governance.py
    - scripts/tests/workspace/test_agent_governance.py
    - scripts/tests/workspace/test_workspace_cli.py
    - scripts/validation/validate_manifest.py
    - skills/disk-scan-reporter/tests/test_disk_scan.py
    - shared/workspace_policy.md
    - reports/manifest_validation_report.md
    - reports/protocol_validation_report.md
    - PROJECT_CONTEXT/tasks/records/
    - AGENTS.md
    validation:
    - python scripts/resolve_task_context.py github_ci_governance
    - python scripts/validate_manifest.py
    - python scripts/validate_protocols.py
    - python scripts/ci_run.py
    - python -m pytest scripts/tests/reporting/test_ci_run.py scripts/tests/workspace/test_agent_governance.py
      -q
    - python -m pytest scripts/tests/workspace/test_workspace_cli.py -q
    - python -m compileall -q scripts
    - git diff --check
  platform_exposure:
    use_when:
    - Fixing Codex, Claude Code, OpenCode, or Hermes skill loading surfaces, junctions,
      projection roots, or CLI paths.
    use_when_zh:
    - 修复 Codex、Claude Code、OpenCode 或 Hermes 的 skill 加载表面、软链接、投影根或 CLI 路径
    required:
    - workspace_manifest.yaml
    - PROJECT_CONTEXT/tasks/registry/index.yaml
    - PROJECT_CONTEXT/governance/context_budget.md
    - actual platform debug output
    optional:
    - PROJECT_CONTEXT/continuity/current_status.md
    - ARCHITECTURE.md
    - USAGE_GUIDES/QUICK_START/codex.md
    - USAGE_GUIDES/QUICK_START/opencode.md
    - scripts/check_links.ps1
    - scripts/validate_manifest.py
    - reports/manifest_validation_report.md
    ignore:
    - packages/character-system/engineering/generation/character-generator/scripts/
    - packages/character-system/runtime/characters/zyc/references/
    - packages/character-system/reports/runtime-loop/
    prompt:
    - platform_exposure
    tool_profile: platform_maintenance
    ledger: true
    write_scope:
    - workspace_manifest.yaml
    - PROJECT_CONTEXT/
    - USAGE_GUIDES/QUICK_START/
    - platform loading junctions explicitly named by the user
    validation:
    - python scripts/validate_manifest.py
    - powershell -ExecutionPolicy Bypass -File scripts/check_links.ps1
    - 'OpenCode: opencode debug skill'
  raw_material_filter_tooling:
    use_when:
    - Changing qq-chat-raw-filter source, package metadata, tests, CI, README, or
      generated public-projection publishing support under packages/character-system/engineering/corpus-preparation/qq-raw-material-filter.
    - Preparing the qq-chat-raw-filter public repository to install, test, or run
      in GitHub Actions.
    use_when_zh:
    - 修改 packages/character-system/engineering/corpus-preparation/qq-raw-material-filter
      下的 qq-chat-raw-filter 源码、包元数据、测试、CI、README 或公开投影发布支持
    required:
    - packages/character-system/engineering/corpus-preparation/qq-raw-material-filter/README.md
    - packages/character-system/engineering/corpus-preparation/qq-raw-material-filter/pyproject.toml
    - packages/character-system/engineering/corpus-preparation/qq-raw-material-filter/qce_block_filter.py
    - packages/character-system/engineering/corpus-preparation/qq-raw-material-filter/qq_raw_filter/
    - packages/character-system/engineering/corpus-preparation/qq-raw-material-filter/tests/
    optional:
    - packages/character-system/engineering/corpus-preparation/qq-raw-material-filter/.github/workflows/
    - packages/character-system/engineering/corpus-preparation/qq-raw-material-filter/requirements.txt
    - scripts/publish_qq_raw_filter.py
    - scripts/publish_check_qq_raw_filter.py
    - scripts/qq_raw_filter_public_checks.py
    - scripts/sync_qq_raw_filter_repo.py
    - scripts/tests/publishing/test_publish_qq_raw_filter.py
    - scripts/tests/publishing/test_sync_qq_raw_filter_repo.py
    - PROJECT_CONTEXT/tasks/records/2026/07/15/TASK-20260715-007.json
    - PROJECT_CONTEXT/tasks/registry/index.yaml
    ignore:
    - private QQ raw exports
    - raw material output buckets
    - external lexicon data directories
    - unrelated workspace tooling
    prompt:
    - task_routing
    tool_profile: workspace_maintenance
    ledger: true
    write_scope:
    - PROJECT_CONTEXT/tasks/registry/index.yaml
    - PROJECT_CONTEXT/tasks/ledger/README.md
    - packages/character-system/engineering/corpus-preparation/qq-raw-material-filter/
    - scripts/publish_qq_raw_filter.py
    - scripts/publish_check_qq_raw_filter.py
    - scripts/qq_raw_filter_public_checks.py
    - scripts/sync_qq_raw_filter_repo.py
    - scripts/tests/publishing/test_publish_qq_raw_filter.py
    - scripts/tests/publishing/test_sync_qq_raw_filter_repo.py
    - PROJECT_CONTEXT/tasks/records/2026/07/15/TASK-20260715-007.json
    validation:
    - python scripts/resolve_task_context.py raw_material_filter_tooling
    - python -m pytest tests -q (from packages/character-system/engineering/corpus-preparation/qq-raw-material-filter)
    - python -m pip install -e . (from packages/character-system/engineering/corpus-preparation/qq-raw-material-filter)
    - qce-block-filter --help
    - python -m qq_raw_filter._cli --help
    - python scripts/workspace_cli.py changes verify raw_material_filter_tooling --strict
    - python scripts/workspace_cli.py workflow check raw_material_filter_tooling --record-id
      TASK-YYYYMMDD-###
    - python scripts/publish_qq_raw_filter.py --out-dir %AI_TOOL_STAGING_DIR%/qq-chat-raw-filter
    - python scripts/publish_check_qq_raw_filter.py --dir %AI_TOOL_STAGING_DIR%/qq-chat-raw-filter
      --skip-tests
    - git diff --check
  runtime_drift_fix:
    use_when:
    - Diagnosing or repairing a live character style drift.
    use_when_zh:
    - 诊断或修复角色实时风格漂移
    required:
    - workspace_manifest.yaml
    - PROJECT_CONTEXT/tasks/registry/index.yaml
    - PROJECT_CONTEXT/governance/context_budget.md
    - packages/character-system/shared/runtime_loop_policy.md
    - packages/character-system/shared/drift_taxonomy.md
    - packages/character-system/shared/patch_protocol.md
    - packages/character-system/engineering/diagnosis/style-doctor/SKILL.md
    - <target-character>/SKILL.md
    optional:
    - <target-character>/references/voice_card.md
    - <target-character>/references/anti_patterns.md
    - <target-character>/references/evaluation_rubric.md
    - <target-character>/prompts/
    - packages/character-system/reports/runtime-loop/ledgers/
    ignore:
    - packages/character-system/engineering/generation/character-generator/scripts/
    - packages/character-system/engineering/generation/character-generator/templates/
    - USAGE_GUIDES/
    - WORKSPACE_ENGINEERING/
    prompt:
    - drift_repair
    tool_profile: workspace_maintenance
    ledger: true
    write_scope:
    - packages/character-system/reports/runtime-loop/
    - <target-character>/
    validation:
    - python scripts/validate_protocols.py when shared protocols, runtime templates,
      ledgers, or core SHARED_PROTOCOLS.md change
  skill_architecture_update:
    use_when:
    - Changing skill role, authority, execution-mode, exposure, projection, or compatibility
      contracts across multiple layers.
    use_when_zh:
    - 跨多个层修改 skill 角色、权限、执行模式、暴露、投影或兼容性合约
    required:
    - AGENTS.md
    - workspace_manifest.yaml
    - PROJECT_CONTEXT/tasks/registry/index.yaml
    - PROJECT_CONTEXT/governance/context_budget.md
    - PROJECT_CONTEXT/tasks/ledger/README.md
    - ARCHITECTURE.md
    - shared/workspace_policy.md
    - shared/workspace_path_policy.md
    - scripts/validate_manifest.py
    - <affected-skills>/SKILL.md
    optional:
    - USAGE_GUIDES/
    - WORKSPACE_ENGINEERING/
    - scripts/bootstrap_workspace.py
    - scripts/migration_dry_run.py
    - scripts/sync_report.ps1
    ignore:
    - private corpus material
    - unrelated historical reports
    - unrelated tool configuration
    prompt:
    - skill_architecture
    tool_profile: platform_maintenance
    ledger: true
    write_scope:
    - workspace_manifest.yaml
    - AGENTS.md
    - ARCHITECTURE.md
    - PROJECT_CONTEXT/
    - shared/
    - packages/
    - skills/
    - USAGE_GUIDES/
    - WORKSPACE_ENGINEERING/
    - scripts/
    - explicitly declared platform projections
    validation:
    - python scripts/bootstrap_workspace.py
    - python scripts/validate_manifest.py
    - python scripts/validate_protocols.py
    - powershell -ExecutionPolicy Bypass -File scripts/check_links.ps1
    - platform discovery checks for changed exposures
    - git diff --check
  skill_lifecycle_tooling:
    use_when:
    - Creating or changing manifest-aware skill init, validate, list, or guarded platform
      exposure commands.
    use_when_zh:
    - 创建或修改 manifest 感知的 skill 初始化、验证、列表或受控平台暴露命令
    required:
    - workspace_manifest.yaml
    - scripts/skill_lifecycle.py
    - scripts/tests/workspace/test_skill_lifecycle.py
    optional:
    - scripts/workspace_cli.py
    - scripts/tests/workspace/test_workspace_cli.py
    - scripts/setup_links.ps1
    - scripts/check_links.ps1
    - USAGE_GUIDES/QUICK_START/workspace_cli.md
    - README.md
    ignore:
    - reports/
    - private corpus material
    - unrelated skill implementation
    - platform loading surfaces except the single manifest-selected projection during
      expose --apply
    prompt:
    - task_routing
    tool_profile: platform_maintenance
    ledger: true
    budget:
      required_warn_tokens: 9000
      expanded_warn_tokens: 16000
    write_scope:
    - PROJECT_CONTEXT/tasks/registry/index.yaml
    - PROJECT_CONTEXT/tasks/ledger/README.md
    - README.md
    - USAGE_GUIDES/QUICK_START/workspace_cli.md
    - scripts/skill_lifecycle.py
    - scripts/tests/workspace/test_skill_lifecycle.py
    - scripts/workspace_cli.py
    - scripts/tests/workspace/test_workspace_cli.py
    - a new skill source path explicitly selected by skill init
    - the single manifest-selected projection explicitly approved through skill expose
      --apply
    validation:
    - python -m unittest scripts.tests.workspace.test_skill_lifecycle scripts.tests.workspace.test_workspace_cli
    - python scripts/workspace_cli.py skill list
    - python scripts/workspace_cli.py skill validate character-generator
    - python scripts/workspace_cli.py skill expose character-generator --platform
      codex
    - python scripts/resolve_task_context.py skill_lifecycle_tooling --format json
    - git diff --check
  skill_metadata_update:
    use_when:
    - Adding or correcting SKILL.md discovery metadata/frontmatter.
    use_when_zh:
    - 添加或修正 SKILL.md 的发现元数据或 frontmatter
    required:
    - workspace_manifest.yaml
    - PROJECT_CONTEXT/tasks/registry/index.yaml
    - PROJECT_CONTEXT/governance/context_budget.md
    - <target-skill>/SKILL.md
    optional:
    - <target-skill>/README.md
    - <target-skill>/SHARED_PROTOCOLS.md
    ignore:
    - reports/
    - WORKSPACE_ENGINEERING/
    - USAGE_GUIDES/
    prompt:
    - minimal_edit
    tool_profile: workspace_maintenance
    ledger: true
    write_scope:
    - <target-skill>/SKILL.md
    validation:
    - git diff -- <target-skill>/SKILL.md
    - platform-specific skill discovery check when available
  skill_release_packaging:
    use_when:
    - Packaging one or more workspace skills as a versioned external product bundle
      or preparing a GitHub Release.
    - Changing release-local installation, verification, beginner guidance, checksums,
      or standalone compatibility overlays.
    - Changing the scrubbed public workspace skeleton publishing, verification, or
      sync tooling.
    use_when_zh:
    - 将一个或多个工作区 skill 打包为版本化外部产品包或准备 GitHub Release
    required:
    - workspace_manifest.yaml
    - shared/delivery_output_policy.md
    - packages/character-system/runtime/characters/zyc/SKILL.md
    - packages/character-system/engineering/diagnosis/style-doctor/SKILL.md
    - packages/character-system/runtime/characters/zyc/scripts/package_skill.py
    optional:
    - packages/character-system/runtime/characters/zyc/README.md
    - packages/character-system/engineering/diagnosis/style-doctor/README.md
    - USAGE_GUIDES/PROMPT_TEMPLATES/character-system/runtime/zyc.md
    - USAGE_GUIDES/PROMPT_TEMPLATES/character-system/engineering/diagnosis/style-doctor.md
    - scripts/skill_lifecycle.py
    - scripts/publish_public.py
    - scripts/publish_check.py
    - scripts/sync_public_repo.py
    - scripts/publish_chatty_ch_system.py
    - scripts/publish_check_chatty_ch_system.py
    - scripts/sync_chatty_ch_system_repo.py
    - scripts/tests/workspace/test_workspace_cli.py
    - WORKSPACE_ENGINEERING/PUBLISH.md
    ignore:
    - private corpus material
    - packages/character-system/reports/runtime-loop/
    - packages/character-system/runtime/characters/zyc/reports/
    - packages/character-system/runtime/characters/zyc/tests/
    - platform loading surfaces except isolated release-install validation roots
    prompt:
    - task_routing
    tool_profile: platform_maintenance
    ledger: true
    budget:
      required_warn_tokens: 18000
      expanded_warn_tokens: 28000
    write_scope:
    - PROJECT_CONTEXT/tasks/registry/index.yaml
    - PROJECT_CONTEXT/tasks/ledger/README.md
    - packages/character-system/distribution/
    - packages/character-system/runtime/characters/zyc/SKILL.md
    - packages/character-system/runtime/characters/zyc/README.md
    - packages/character-system/engineering/diagnosis/style-doctor/SKILL.md
    - packages/character-system/engineering/diagnosis/style-doctor/README.md
    - scripts/publish_public.py
    - scripts/publish_check.py
    - scripts/sync_public_repo.py
    - scripts/tests/publishing/test_publish_public.py
    - scripts/publish_chatty_ch_system.py
    - scripts/publish_check_chatty_ch_system.py
    - scripts/sync_chatty_ch_system_repo.py
    - scripts/tests/publishing/test_publish_chatty_ch_system.py
    - scripts/tests/workspace/test_workspace_cli.py
    - WORKSPACE_ENGINEERING/PUBLISH.md
    validation:
    - python scripts/resolve_task_context.py skill_release_packaging
    - python scripts/skill_lifecycle.py validate zyc
    - python scripts/skill_lifecycle.py validate style-doctor
    - release builder deterministic-build and package-content checks
    - isolated OpenCode junction, copy, discovery, and smoke checks
    - python scripts/validate_manifest.py
    - python scripts/validate_protocols.py
    - python -m pytest -q scripts/tests/publishing/test_publish_public.py
    - publish_public.py explicit staging-dir smoke check under the tool staging directory
    - publish_check.py verification against the generated staging directory
    - python scripts/sync_public_repo.py --dry-run --skip-tests
    - python -m pytest -q scripts/tests/publishing/test_publish_chatty_ch_system.py
    - publish_chatty_ch_system.py explicit staging-dir smoke check under the tool
      staging directory
    - publish_check_chatty_ch_system.py verification against the generated staging
      directory
    - python scripts/sync_chatty_ch_system_repo.py --dry-run --skip-tests
    - python scripts/workspace_cli.py changes verify skill_release_packaging --strict
    - python scripts/workspace_cli.py workflow check skill_release_packaging
    - git diff --check
