schema_version: "0.2"
purpose: "Low-status registry for potential workspace integration improvements that are not active todo items."

rules:
  - "Use this file for reusable improvement options that are plausible but not ready to become PROJECT_CONTEXT/todo/ or enforceable policy."
  - "Check it when a new issue resembles a previously noticed integration gap."
  - "Promote an option to task routing, shared policy, tooling, or todo only when current evidence makes it actionable."
  - "Move implemented or rejected options to history/optimization_options.yaml with migration metadata."
  - "Keep entries brief; this is a retrieval aid, not a design document."

statuses:
  candidate: "Worth remembering; no committed implementation plan yet."
  active: "Being implemented in the current task."

# Terminal statuses belong in history/optimization_options.yaml.
options:

  - id: "OPT-20260718-010"
    title: "Selective directory-local manifests for address-heavy domains"
    status: "candidate"
    trigger_when:
      - "A directory has multiple independent consumers, mutable internal paths, and repeated path facts that cannot be expressed cleanly by workspace_manifest.yaml or an existing domain index."
      - "A directory-local path change repeatedly requires synchronized edits across scripts, tests, documentation, and publishers."
    potential_resolution:
      - "Introduce a small tracked YAML manifest only for the proven domain, with stable ids, relative paths, ownership, and validation rules."
      - "Resolve variables through one loader or the existing workspace manifest; do not add ad-hoc `${root}` interpolation without a parser and schema."
      - "Keep workspace_manifest.yaml as the global source of truth and make local manifests subordinate indexes, not competing root registries."
      - "Start with a read-only report or validator and add write behavior only after two independent consumers justify the seam."
    current_decision:
      - "No immediate manifest is needed for scripts, reports, shared, or WORKSPACE_ENGINEERING; existing runtime, registry, manifest, and README interfaces are sufficient."
      - "Re-evaluate WORKSPACE_ENGINEERING only if its knowledge navigation becomes machine-consumed by multiple tools."
    related_files:
      - "workspace_manifest.yaml"
      - "PROJECT_CONTEXT/context_index.yaml"
      - "scripts/workspace/runtime.py"
      - "scripts/workspace/entrypoints.py"

  - id: "OPT-20260718-009"
    title: "Explicit Claude Code user-profile maintenance review"
    status: "candidate"
    trigger_when:
      - "A workspace review finds the installed Claude Code version behind a freshly verified official release."
      - "An enabled user-level plugin has no demonstrated workflow value, or provider auto mode repeatedly remains unavailable."
    potential_resolution:
      - "Recheck the official release before updating the user-level Claude Code installation; do not rely on an old handoff version claim."
      - "Review the idle plugin and provider auto-mode limitation with the user, then disable the plugin or change provider behavior only with explicit approval."
      - "Keep user-profile changes outside ordinary workspace commits and record only their workspace-facing effect."
    related_files:
      - "${USER_HOME}/.claude/settings.json"
      - ".claude/settings.json"
      - "PROJECT_CONTEXT/todo/workspace-optimization.md"

  - id: "OPT-20260703-003"
    title: "First-class conversational character-generator intake"
    status: "candidate"
    trigger_when:
      - "Users provide character build information in chat and should not edit JSON directly."
      - "A build still requires an agent-created temporary intake file to call `build_character.py --intake`."
    potential_resolution:
      - "Add a supported CLI or agent-facing wrapper that accepts structured conversational intake directly and writes private plans only as an internal implementation detail."
      - "Keep required-field checks, optional-field warnings, and safe defaults as the public contract rather than exposing the private JSON shape."
    related_files:
      - "packages/character-system/engineering/generation/character-generator/scripts/build_character.py"
      - "packages/character-system/engineering/generation/character-generator/scripts/intake_plan.py"
      - "packages/character-system/engineering/generation/character-generator/docs/interface_design.md"

  - id: "OPT-20260703-004"
    title: "Generated character promotion path from ignored draft to maintained runtime skill"
    status: "candidate"
    trigger_when:
      - "A generated character under `character-generator/characters/` becomes stable enough for runtime use or style maintenance."
      - "The user wants to tune a generated character without losing changes on regeneration."
    potential_resolution:
      - "Define a reviewable promotion workflow from ignored generated output to `packages/character-system/runtime/characters/<id>`."
      - "After promotion, register manifest exposure and route future tuning through style-doctor and character-maintainer instead of regenerating over manual patches."
      - "Keep private raw corpus and unreviewed generated drafts out of Git until privacy review passes."
    related_files:
      - "packages/character-system/engineering/generation/character-generator/.gitignore"
      - "packages/character-system/runtime/characters/"
      - "workspace_manifest.yaml"
      - "packages/character-system/shared/character_skill_spec.md"

  - id: "OPT-20260703-005"
    title: "Dedicated friend-chat task contract instead of overloading discussion"
    status: "candidate"
    trigger_when:
      - "A character is mainly intended for natural friend chat rather than generic bounded discussion."
      - "Generated prompts need to distinguish casual companionship, critique, reflection, and ordinary discussion."
    potential_resolution:
      - "Evaluate whether `friend_chat` should become a first-class `target_tasks` enum or a structured sub-mode of `discussion`."
      - "Update schemas, templates, validation cases, and task routing only if repeated generated characters need this distinction."
    related_files:
      - "packages/character-system/engineering/generation/character-generator/schemas/character_config.schema.json"
      - "packages/character-system/engineering/generation/character-generator/templates/prompt_discussion.template.md"
      - "packages/character-system/engineering/generation/character-generator/templates/task_recipes.template.md"
      - "packages/character-system/engineering/generation/character-generator/tests/"

  - id: "OPT-20260703-006"
    title: "Machine-readable source README contract for corpus planning"
    status: "candidate"
    trigger_when:
      - "A source README contains rules such as speaker identity, context note handling, worklist expansion, or normalization preferences."
      - "The generator relies on generic heuristics instead of a source-local machine-readable contract."
    potential_resolution:
      - "Define an optional small YAML frontmatter/block for source README files that declares source role, speaker rules, context-note policy, worklist expansion, and privacy notes."
      - "Keep prose README useful for humans while letting generator ingest exact per-source rules without guessing from text."
    related_files:
      - "WORKSPACE_ENGINEERING/skill_engineering/personal_corpus_preparation.md"
      - "packages/character-system/engineering/generation/character-generator/scripts/ingest_corpus.py"
      - "packages/character-system/engineering/generation/character-generator/docs/workflow.md"

  - id: "OPT-20260703-007"
    title: "Improve Chinese style extraction beyond naive character n-grams"
    status: "candidate"
    trigger_when:
      - "Generated style references show rough high-frequency fragments or topic candidates that are artifacts of Chinese tokenization."
      - "Multiple Chinese character builds need better signal separation between style, topic, and formatting residue."
    potential_resolution:
      - "Add a lightweight Chinese segmentation or phrase-filtering layer, or make high-frequency term reporting less prominent until validated."
      - "Keep privacy-safe summaries and avoid adding heavyweight dependencies unless repeated builds justify them."
    related_files:
      - "packages/character-system/engineering/generation/character-generator/scripts/corpus_stats.py"
      - "packages/character-system/engineering/generation/character-generator/scripts/extract_style.py"
      - "packages/character-system/engineering/generation/character-generator/templates/style_profile.template.md"

  - id: "OPT-20260703-008"
    title: "Separate platform skill discovery surfaces to avoid cross-platform leakage"
    status: "candidate"
    trigger_when:
      - "OpenCode `/skill` lists skills that were intended only for Claude or path-based inspection."
      - "Generated character drafts under `character-generator/characters/` appear as runnable platform skills before runtime promotion."
      - "A platform scans another platform's projection root, such as OpenCode discovering `.claude/skills/**/SKILL.md`."
    observed_issue:
      - "OpenCode 1.17.13 discovers project/global skill roots including `.claude/skills` and recursively scans for `SKILL.md`."
      - "`opencode debug skill` showed `character-generator`, `character-maintainer`, `writera-style`, and `zf-style` through `${WORKSPACE_ROOT}/.claude/skills/...` even though only `style-doctor` and `zyc` were configured in the OpenCode skill root."
      - "`zf-style` was discovered from `${WORKSPACE_ROOT}/.claude/skills/character-generator/characters/zf/SKILL.md`; this does not mean zf has been promoted to runtime, only that a generated draft was visible through a scanned projection tree."
    potential_resolution:
      - "If this becomes disruptive, move Claude projection roots outside `${WORKSPACE_ROOT}` or configure OpenCode to avoid Claude-compatible skill discovery when working in this repo."
      - "Consider keeping generated character drafts out of any platform-scanned projection tree until they are promoted to runtime."
      - "Alternatively, document this as acceptable low-risk visibility while preserving authority boundaries through manifest roles and OpenCode governance."
    current_decision:
      - "No immediate fix. The user judged the current behavior acceptable for now; record the issue for future platform-exposure cleanup."
    related_files:
      - "workspace_manifest.yaml"
      - ".claude/skills/"
      - "opencode.json"
      - ".opencode/plugins/workspace-governance.js"
      - "packages/character-system/engineering/generation/character-generator/characters/"
