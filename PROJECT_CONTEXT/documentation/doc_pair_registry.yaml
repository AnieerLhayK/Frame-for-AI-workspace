schema_version: "0.1"
purpose: "Track Markdown files and directories whose same-name zh-CN companions must be considered when edited."

rules:
  - "When editing a registered Markdown primary, update the same-name .zh-CN.md companion when it exists, or record why no semantic sync is needed."
  - "A directory entry registers every matching Markdown primary under that directory; exact pairs are only needed for root-level files, exceptions, or files outside registered directories."
  - "When creating a new .zh-CN.md companion outside a registered directory rule, add an exact pair or directory rule here in the same change."
  - "Use this registry to avoid broad repository scans during normal edits; check only the registered directories or exact pairs relevant to the changed files."
  - "Semantic sync is required, not literal translation parity."

directories:
  - path: ""
    pattern: "README.md"
    recursive: false
    companion_suffix: ".zh-CN.md"
    sync_level: "semantic"
    note: "Root workspace README bilingual companion."
  - path: "PROJECT_CONTEXT"
    pattern: "*.md"
    recursive: true
    companion_suffix: ".zh-CN.md"
    sync_level: "semantic"
    note: "Project memory docs and project-context report READMEs with bilingual companions."
  - path: "USAGE_GUIDES"
    pattern: "README.md"
    recursive: false
    companion_suffix: ".zh-CN.md"
    sync_level: "semantic"
    note: "Usage guide root README bilingual companion."
