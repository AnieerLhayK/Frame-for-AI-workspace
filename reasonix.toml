[agent]
system_prompt = """
You are Reasonix operating inside the governed ${WORKSPACE_ROOT} repository.
Your workspace role is record_producer, not source maintainer. Read and invoke
registered skills, but write only scoped diagnosis, handoff, Reasonix report,
or agent-request records. A user request does not expand authority: never
offer, request permission for, or attempt direct edits to skill source,
governance, manifests, projections, or runtime character files. Character
drift routes through style-doctor, then diagnosis/handoff, then
character-maintainer. When structural work is needed, create an agent request
for Codex or Claude. These rules apply only while this project config is active.
This host has no per-write task-record adapter, so all writes are fail-closed
until that adapter can require an active WORKSPACE_TASK_RECORD.
"""

[skills]
paths = [
  "packages/character-system/engineering/diagnosis/style-doctor",
  "packages/character-system/runtime/characters/zyc",
]

[permissions]
mode = "deny"
allow = []
deny = [
  "write_file(workspace_manifest.yaml)",
  "write_file(AGENTS.md)",
  "write_file(CLAUDE.md)",
  "write_file(README.md)",
  "write_file(PROJECT_CONTEXT/*)",
  "write_file(shared/*)",
  "write_file(scripts/*)",
  "write_file(.claude/*)",
  "write_file(.opencode/*)",
  "write_file(packages/character-system/runtime/*)",
  "write_file(packages/character-system/runtime/**)",
  "write_file(packages/character-system/engineering/*)",
  "write_file(packages/character-system/engineering/**)",
  "write_file(packages/character-system/shared/*)",
  "write_file(packages/character-system/shared/**)",
  "edit_file(workspace_manifest.yaml)",
  "edit_file(AGENTS.md)",
  "edit_file(CLAUDE.md)",
  "edit_file(README.md)",
  "edit_file(PROJECT_CONTEXT/*)",
  "edit_file(shared/*)",
  "edit_file(scripts/*)",
  "edit_file(.claude/*)",
  "edit_file(.opencode/*)",
  "edit_file(packages/character-system/runtime/*)",
  "edit_file(packages/character-system/runtime/**)",
  "edit_file(packages/character-system/engineering/*)",
  "edit_file(packages/character-system/engineering/**)",
  "edit_file(packages/character-system/shared/*)",
  "edit_file(packages/character-system/shared/**)",
  "multi_edit(workspace_manifest.yaml)",
  "multi_edit(AGENTS.md)",
  "multi_edit(CLAUDE.md)",
  "multi_edit(README.md)",
  "multi_edit(PROJECT_CONTEXT/*)",
  "multi_edit(shared/*)",
  "multi_edit(scripts/*)",
  "multi_edit(.claude/*)",
  "multi_edit(.opencode/*)",
  "multi_edit(packages/character-system/runtime/*)",
  "multi_edit(packages/character-system/runtime/**)",
  "multi_edit(packages/character-system/engineering/*)",
  "multi_edit(packages/character-system/engineering/**)",
  "multi_edit(packages/character-system/shared/*)",
  "multi_edit(packages/character-system/shared/**)",
  "mcp__filesystem__write_file(*)",
  "mcp__filesystem__edit_file(*)",
  "mcp__filesystem__create_directory(*)",
  "mcp__filesystem__move_file(*)",
  "bash(*)",
  "bash(git commit*)",
  "bash(git push*)",
  "bash(git reset*)",
  "bash(git checkout*)",
  "bash(git clean*)",
  "bash(rm *)",
  "bash(del *)",
  "bash(remove-item *)",
  "skill_manage(*)",
]

[sandbox]
workspace_root = "${WORKSPACE_ROOT}"
allow_write = ["${DATA_ROOT}/reasonix\\cache\\staging"]
bash = "enforce"
network = true

[[plugins]]
name = "filesystem"
command = "${WORKSPACE_ROOT}\\mcp\\servers\\filesystem\\node_modules\\.bin\\mcp-server-filesystem.cmd"
args = [
  "${DATA_ROOT}/reasonix",
  "${DATA_ROOT}/out",
  "${WORKSPACE_ROOT}\\packages\\character-system\\shared",
  "${WORKSPACE_ROOT}\\packages\\character-system\\reports\\runtime-loop",
]
