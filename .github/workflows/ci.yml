name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-quality:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements-context-tools.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r scripts/requirements-context-tools.txt pytest

      - name: Check Python syntax
        run: python -m compileall -q scripts

      - name: Run tests
        run: python scripts/ci_run.py
